name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev libftdi1-dev

      - name: Build linux/amd64
        run: CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -o build/linux_amd64/mindlights ./cmd/scan

      - name: Upload linux/amd64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mindlights-linux-amd64
          path: build/linux_amd64/mindlights

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build macOS/${{ matrix.goarch }}
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=${{ matrix.goarch }} go build -o build/macOS_${{ matrix.goarch }}/mindlights ./cmd/scan

      - name: Upload macOS/${{ matrix.goarch }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: mindlights-macos-${{ matrix.goarch }}
          path: build/macOS_${{ matrix.goarch }}/mindlights
